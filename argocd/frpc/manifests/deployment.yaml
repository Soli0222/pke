apiVersion: apps/v1
kind: Deployment
metadata:
  name: frpc
  namespace: frpc
  labels:
    app: frpc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frpc
  template:
    metadata:
      labels:
        app: frpc
    spec:
      containers:
        - name: frpc
          image: ghcr.io/fatedier/frpc:v0.68.0
          args: ["-c", "/etc/frp/frpc.toml"]
          env:
            - name: TZ
              value: Asia/Tokyo
            - name: FRP_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: frp-token
                  key: token
          volumeMounts:
            - name: config
              mountPath: /etc/frp
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
      volumes:
        - name: config
          configMap:
            name: frpc-config
