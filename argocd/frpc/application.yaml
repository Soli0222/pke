apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: frpc
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://github.com/Soli0222/pke.git
      targetRevision: HEAD
      path: argocd/frpc/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: frpc
  # syncPolicy:
  #   automated:
  #     prune: true
  #     selfHeal: true
  #   syncOptions:
  #     - CreateNamespace=true
