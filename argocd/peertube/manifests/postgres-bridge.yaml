apiVersion: v1
kind: ServiceAccount
metadata:
  name: peertube-secret-reader
  namespace: peertube
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: peertube-secret-reader
  namespace: peertube
rules:
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - authorization.k8s.io
    resources:
      - selfsubjectrulesreviews
      - selfsubjectaccessreviews
    verbs:
      - create
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: peertube-secret-reader
  namespace: peertube
subjects:
  - kind: ServiceAccount
    name: peertube-secret-reader
    namespace: peertube
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: peertube-secret-reader
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: peertube-kubernetes
  namespace: peertube
spec:
  provider:
    kubernetes:
      remoteNamespace: peertube
      server:
        url: https://kubernetes.default.svc
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          key: ca.crt
      auth:
        serviceAccount:
          name: peertube-secret-reader
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: peertube-postgres-bridge
  namespace: peertube
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: peertube-kubernetes
  target:
    name: peertube-postgres-bridge
    template:
      engineVersion: v2
      type: Opaque
      data:
        postgres-username: "{{ .username }}"
        postgres-password: "{{ .password }}"
  data:
    - secretKey: username
      remoteRef:
        key: peertube-cluster-app
        property: username
    - secretKey: password
      remoteRef:
        key: peertube-cluster-app
        property: password
