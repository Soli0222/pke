global:
  extraEnvFrom:
    - secretRef:
        name: minio-secrets

storage:
  trace:
    backend: s3
    s3:
      access_key: "${S3_ACCESS_KEY_ID}"
      secret_key: "${S3_SECRET_ACCESS_KEY}"
      bucket: "tempo-traces"
      endpoint: "minio.str08.net"
      region: "minio-kkg-1"
      forcepathstyle: true

ingester:
  replicas: 3
  extraArgs:
    - "-config.expand-env=true"

distributor:
  extraArgs:
    - "-config.expand-env=true"

compactor:
  extraArgs:
    - "-config.expand-env=true"

querier:
  extraArgs:
    - "-config.expand-env=true"

queryFrontend:
  extraArgs:
    - "-config.expand-env=true"

metricsGenerator:
  extraArgs:
    - "-config.expand-env=true"

gateway:
  enabled: true
  ingress:
    enabled: true
    ingressClassName: traefik
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt
    hosts:
      - host: tempo.str08.net
        paths:
          - path: /
            pathType: Prefix
    tls:
      - hosts:
          - tempo.str08.net
        secretName: tempo.str08.net-dns01

metaMonitoring:
  serviceMonitor:
    enabled: true
