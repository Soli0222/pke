apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: tempo-mtls-selfsigned
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: tempo-mtls-ca
spec:
  isCA: true
  commonName: tempo-mtls-ca
  secretName: tempo-mtls-ca-secret
  duration: 87600h # 10 years
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: tempo-mtls-selfsigned
    kind: Issuer
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: tempo-mtls-ca-issuer
spec:
  ca:
    secretName: tempo-mtls-ca-secret
