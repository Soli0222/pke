global:
  extraEnvFrom:
    - secretRef:
        name: minio-secrets

minio:
  enabled: false

mimir:
  structuredConfig:
    common:
      storage:
        backend: s3
        s3:
          endpoint: "minio.str08.net"
          region: "minio-kkg-1"
          secret_access_key: "${S3_SECRET_ACCESS_KEY}"
          access_key_id: "${S3_ACCESS_KEY_ID}"

    blocks_storage:
      s3:
        bucket_name: mimir-blocks

    alertmanager_storage:
      s3:
        bucket_name: mimir-alertmanager

    ruler_storage:
      s3:
        bucket_name: mimir-ruler

    limits:
      compactor_blocks_retention_period: "60d" 
      max_global_series_per_user: 1000000
      ingestion_rate: 50000
      ingestion_burst_size: 1000000
      out_of_order_time_window: "5m"

alertmanager:
  resources:
    requests:
      cpu: 20m
      memory: 64Mi
    limits:
      memory: 128Mi

distributor:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 256Mi

ingester:
  replicas: 3
  zoneAwareReplication:
    enabled: false
  resources:
    requests:
      cpu: 150m
      memory: 768Mi
    limits:
      memory: 1536Mi

querier:
  resources:
    requests:
      cpu: 150m
      memory: 512Mi
    limits:
      memory: 1Gi

query_frontend:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi

query_scheduler:
  resources:
    requests:
      cpu: 100m
      memory: 64Mi
    limits:
      memory: 128Mi

ruler:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 256Mi

compactor:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 256Mi

kafka:
  resources:
    requests:
      cpu: 100m
      memory: 1536Mi
    limits:
      memory: 3Gi

store_gateway:
  replicas: 3
  zoneAwareReplication:
    enabled: false
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 512Mi

ingress:
  enabled: true
  className: traefik
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
  ingressClassName: traefik
  hosts:
    - mimir.str08.net
  tls:
    - hosts:
        - mimir.str08.net
      secretName: mimir.str08.net-dns01

metaMonitoring:
  serviceMonitor:
    enabled: true

  prometheusRule:
    enabled: true
    mimirAlerts: true
    mimirRules: true