apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sui
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - chart: sui
      repoURL: https://soli0222.github.io/helm-charts
      targetRevision: 0.1.1
      helm:
        valueFiles:
          - $values/argocd/sui/values.yaml
    - repoURL: https://github.com/Soli0222/pke.git
      targetRevision: HEAD
      ref: values
    - repoURL: https://github.com/Soli0222/pke.git
      targetRevision: HEAD
      path: argocd/sui/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: sui
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
