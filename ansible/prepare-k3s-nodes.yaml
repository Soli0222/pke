---
- name: Prepare k3s nodes
  hosts: k3s_cluster
  become: true
  roles:
    - general-configuration
    - ssh-agent-sudo
    - network
    - sysctl
    - ufw

- name: Prepare TopoLVM storage volume groups first
  hosts: topolvm_storage
  become: true
  roles:
    - topolvm

- name: Prepare Longhorn storage volumes after local storage
  hosts: longhorn_storage
  become: true
  roles:
    - longhorn-storage

- name: Install Alloy
  hosts: all
  become: true
  roles:
    - install-alloy

- name: Install Falco
  hosts: all
  become: true
  roles:
    - install-falco
