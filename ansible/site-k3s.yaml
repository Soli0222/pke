---
- name: Prepare etcd nodes
  hosts: etcd
  become: true
  roles:
    - all-vm-config
    - configure-ufw

- name: Install and configure external etcd
  hosts: etcd
  become: true
  roles:
    - setup-etcd
    - etcd-maintenance

- name: Validate external etcd
  hosts: etcd
  become: true
  roles:
    - etcd-precheck

- name: Prepare k3s nodes
  hosts: k3s_cluster
  become: true
  roles:
    - all-vm-config
    - configure-ufw

- name: Install k3s servers
  hosts: k3s_server
  become: true
  serial: 1
  roles:
    - install-k3s

- name: Install k3s agents
  hosts: k3s_agent
  become: true
  serial: 1
  roles:
    - install-k3s
