---
- name: Ensure etcd snapshot directory exists
  ansible.builtin.file:
    path: "{{ etcd_snapshot_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Check required etcd certificate files
  ansible.builtin.stat:
    path: "{{ item }}"
  register: etcd_cert_stats
  loop:
    - "{{ etcd_pki_dir }}/ca.crt"
    - "{{ etcd_pki_dir }}/healthcheck-client.crt"
    - "{{ etcd_pki_dir }}/healthcheck-client.key"

- name: Validate required etcd certificate files
  ansible.builtin.assert:
    that:
      - item.stat.exists
    fail_msg: "Required etcd certificate file is missing: {{ item.stat.path }}"
  loop: "{{ etcd_cert_stats.results }}"

- name: Check local etcd endpoint health
  ansible.builtin.command: >-
    /usr/local/bin/etcdctl
    --endpoints=https://127.0.0.1:{{ etcd_client_port }}
    --cacert={{ etcd_pki_dir }}/ca.crt
    --cert={{ etcd_pki_dir }}/healthcheck-client.crt
    --key={{ etcd_pki_dir }}/healthcheck-client.key
    endpoint health
  changed_when: false

- name: Get etcd member list
  ansible.builtin.command: >-
    /usr/local/bin/etcdctl
    --endpoints=https://127.0.0.1:{{ etcd_client_port }}
    --cacert={{ etcd_pki_dir }}/ca.crt
    --cert={{ etcd_pki_dir }}/healthcheck-client.crt
    --key={{ etcd_pki_dir }}/healthcheck-client.key
    member list
  register: etcd_member_list
  changed_when: false

- name: Validate local host exists in etcd member list
  ansible.builtin.assert:
    that:
      - inventory_hostname in etcd_member_list.stdout
    fail_msg: "inventory_hostname={{ inventory_hostname }} was not found in etcd member list output."
