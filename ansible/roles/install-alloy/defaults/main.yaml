---
cluster_name: natsume
# Remote observability endpoints. The external endpoints are protected by
# monitoring mTLS certificates managed by cert-manager/1Password.
mimir_endpoint: https://mimir.pstr.space/api/v1/push
loki_endpoint: https://loki.pstr.space/loki/api/v1/push

# Tenant headers used by the Alloy templates. They are harmless for the
# current single-tenant backend configuration and keep the clients explicit.
mimir_org_id: anonymous
loki_org_id: fake

# Paths written by this role after reading the monitoring mTLS item from
# 1Password.
tls_cert_path: /etc/cert/monitoring/tls.crt
tls_key_path: /etc/cert/monitoring/tls.key

# Optional Docker log collection. Enable this per host/group where Docker is
# present and container logs should be sent to Loki.
docker:
  enabled: false
