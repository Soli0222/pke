---
- name: Install ufw
  ansible.builtin.apt:
    name: ufw
    state: present
    update_cache: true

- name: Ensure IPv6 is enabled for ufw
  ansible.builtin.lineinfile:
    path: /etc/default/ufw
    regexp: '^IPV6='
    line: 'IPV6=yes'
    owner: root
    group: root
    mode: "0644"

- name: Allow SSH
  community.general.ufw:
    rule: allow
    from_ip: "{{ item }}"
    port: "22"
    proto: tcp
  loop: "{{ ufw_allow_ssh_from }}"

- name: Allow etcd client traffic
  community.general.ufw:
    rule: allow
    from_ip: "{{ item }}"
    port: "2379"
    proto: tcp
  loop: "{{ ufw_k3s_node_cidrs }}"
  when: inventory_hostname in groups['etcd'] | default([])

- name: Allow etcd peer traffic
  community.general.ufw:
    rule: allow
    from_ip: "{{ item }}"
    port: "2380"
    proto: tcp
  loop: "{{ ufw_k3s_node_cidrs }}"
  when: inventory_hostname in groups['etcd'] | default([])

- name: Allow etcd metrics traffic
  community.general.ufw:
    rule: allow
    from_ip: "{{ item }}"
    port: "2381"
    proto: tcp
  loop: "{{ ufw_allow_etcd_metrics_from }}"
  when: inventory_hostname in groups['etcd'] | default([])

- name: Allow Kubernetes API
  community.general.ufw:
    rule: allow
    from_ip: "{{ item }}"
    port: "6443"
    proto: tcp
  loop: "{{ ufw_k3s_node_cidrs }}"
  when: inventory_hostname in groups['k3s_server'] | default([])

- name: Allow kubelet traffic
  community.general.ufw:
    rule: allow
    from_ip: "{{ item }}"
    port: "10250"
    proto: tcp
  loop: "{{ ufw_k3s_node_cidrs }}"
  when: inventory_hostname in groups['k3s_cluster'] | default([])

- name: Allow flannel VXLAN traffic
  community.general.ufw:
    rule: allow
    from_ip: "{{ item }}"
    port: "8472"
    proto: udp
  loop: "{{ ufw_k3s_node_cidrs }}"
  when: inventory_hostname in groups['k3s_cluster'] | default([])

- name: Allow NodePort TCP traffic
  community.general.ufw:
    rule: allow
    port: 30000:32767
    proto: tcp
  when: ufw_allow_nodeport | bool

- name: Allow NodePort UDP traffic
  community.general.ufw:
    rule: allow
    port: 30000:32767
    proto: udp
  when: ufw_allow_nodeport | bool

- name: Enable ufw
  community.general.ufw:
    state: enabled
    policy: "{{ ufw_default_incoming_policy }}"

