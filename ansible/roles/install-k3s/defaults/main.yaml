---
k3s_version: "v1.32.3+k3s1"
k3s_bind_address: "127.0.0.1"
k3s_cluster_init: true

# kubeconfig permissions (0644 allows non-root read)
k3s_write_kubeconfig_mode: "0600"

# Dual-stack networking
k3s_cluster_cidr: "10.9.0.0/16,fd00:10:9::/56"
k3s_service_cidr: "10.7.0.0/16,fd00:10:7::/112"
k3s_cluster_dns: "10.7.0.10,fd00:10:7::a"

# Embedded etcd S3 snapshot settings
k3s_etcd_s3: true
k3s_etcd_s3_bucket: ""
k3s_etcd_s3_region: "us-east-1"
k3s_etcd_s3_folder: ""
k3s_etcd_s3_endpoint_ca: ""
k3s_etcd_s3_skip_ssl_verify: false

# 1Password lookup settings for S3 credentials
# Override k3s_op_vault and k3s_op_item in group_vars/host_vars
k3s_op_vault: "Kubernetes"
k3s_op_item: "k3s etcd s3"
k3s_op_field_access_key: "access_key"
k3s_op_field_secret_key: "secret_key"
k3s_op_field_endpoint: "endpoint"

k3s_etcd_snapshot_schedule_cron: "0 */6 * * *"
k3s_etcd_snapshot_retention: 5
