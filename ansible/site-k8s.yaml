- name: Kubernetes Cluster Setup
  hosts: k8s
  become: true
  roles:
    - install-containerd
    - install-kubernetes
    - role: install-kube-vip
      when: inventory_hostname in groups['k8s-cp']
    - role: bootstrap-etcd-certs
      when:
        - (etcd_mode | default('stacked')) == 'external'
        - inventory_hostname in groups['k8s-cp']
    - role: install-etcd-systemd
      when:
        - (etcd_mode | default('stacked')) == 'external'
        - inventory_hostname in groups['k8s-cp']
      vars:
        etcd_cluster_state_mode: new
        etcd_install_start: true
    - init-cp-kubernetes
    - join-cp-kubernetes
    - join-wk-kubernetes
