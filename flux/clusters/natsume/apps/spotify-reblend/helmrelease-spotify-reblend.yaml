apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: spotify-reblend
  namespace: spotify-reblend
spec:
  interval: 10m
  releaseName: spotify-reblend
  targetNamespace: spotify-reblend
  install:
    createNamespace: false
    crds: Create
  upgrade:
    crds: CreateReplace
  chart:
    spec:
      chart: spotify-reblend
      version: 0.1.5
      sourceRef:
        kind: HelmRepository
        name: spotify-reblend-repo
        namespace: spotify-reblend
      interval: 1h
  values:
    resources:
      requests:
        memory: 256Mi
        cpu: 250m
      limits:
        memory: 512Mi
        cpu: 500m
    config:
      spotifyRedirectUri: https://reblend.pstr.space/callback
      existingSecret: spotify-reblend-secret
    ingress:
      enabled: true
      className: traefik
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-http01
        external-dns.alpha.kubernetes.io/cloudflare-proxied: 'true'
      hosts:
      - host: reblend.pstr.space
        paths:
        - path: "/"
          pathType: ImplementationSpecific
      tls:
      - secretName: reblend.pstr.space-http01
        hosts:
        - reblend.pstr.space
    postgres:
      enabled: false
    externalPostgres:
      host: reblend-cluster-rw
      port: 5432
      username: reblend
      database: reblend
      auth:
        existingSecret: reblend-cluster-app
        secretKey: password
