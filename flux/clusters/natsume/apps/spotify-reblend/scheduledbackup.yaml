apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: reblend-cluster-daily-backup
  namespace: spotify-reblend
spec:
  schedule: "0 10 18 * * *"
  backupOwnerReference: self
  cluster:
    name: reblend-cluster
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
