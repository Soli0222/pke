apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: reblend-cluster
  namespace: spotify-reblend
spec:
  instances: 2
  plugins:
  - name: barman-cloud.cloudnative-pg.io
    isWALArchiver: false
    parameters:
      barmanObjectName: reblend-backup-store
  storage:
    size: 5Gi
  bootstrap:
    initdb:
      database: reblend
      owner: reblend
