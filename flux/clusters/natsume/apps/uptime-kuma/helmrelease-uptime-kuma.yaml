apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: uptime-kuma
  namespace: uptime-kuma
spec:
  interval: 10m
  releaseName: uptime-kuma
  targetNamespace: uptime-kuma
  install:
    createNamespace: false
    crds: Create
  upgrade:
    crds: CreateReplace
  chart:
    spec:
      chart: uptime-kuma
      version: 4.0.0
      sourceRef:
        kind: HelmRepository
        name: uptime-kuma-repo
        namespace: uptime-kuma
      interval: 1h
  values:
    volume:
      enabled: true
      accessMode: ReadWriteMany
      size: 4Gi
    ingress:
      enabled: true
      className: traefik-external
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt
        external-dns.alpha.kubernetes.io/target: meruto-01.pstr.space
      hosts:
      - host: status.pstr.space
        paths:
        - path: "/"
          pathType: ImplementationSpecific
      tls:
      - hosts:
        - status.pstr.space
        secretName: status.pstr.space-dns01
    serviceMonitor:
      enabled: false
