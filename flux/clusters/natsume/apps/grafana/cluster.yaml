apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: grafana-cluster
  namespace: grafana
spec:
  instances: 1
  primaryUpdateMethod: switchover
  smartShutdownTimeout: 60
  affinity:
    nodeSelector:
      kubernetes.io/hostname: natsume-03
  storage:
    size: 10Gi
  bootstrap:
    initdb:
      database: grafana
      owner: grafana
