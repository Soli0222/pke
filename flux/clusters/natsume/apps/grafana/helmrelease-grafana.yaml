apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana
  namespace: grafana
spec:
  interval: 10m
  releaseName: grafana
  targetNamespace: grafana
  install:
    createNamespace: false
  chart:
    spec:
      chart: grafana
      version: 10.5.15
      sourceRef:
        kind: HelmRepository
        name: grafana-repo
        namespace: grafana
      interval: 1h
  values:
    replicas: 1

    admin:
      existingSecret: grafana-admin
      userKey: admin-user
      passwordKey: admin-password

    persistence:
      enabled: false

    env:
      GF_DATABASE_TYPE: postgres
      GF_DATABASE_HOST: grafana-cluster-rw.grafana.svc.cluster.local:5432
      GF_DATABASE_NAME: grafana
      GF_DATABASE_USER: grafana
      GF_DATABASE_SSL_MODE: disable

    envValueFrom:
      GF_DATABASE_PASSWORD:
        secretKeyRef:
          name: grafana-cluster-app
          key: password

    serviceMonitor:
      enabled: true

    ingress:
      enabled: true
      ingressClassName: traefik
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-http01
        traefik.ingress.kubernetes.io/router.tls.options: cert-manager-pke-natsume-mtls@kubernetescrd
      hosts:
        - grafana.str08.net
      tls:
        - secretName: grafana.str08.net-http01
          hosts:
            - grafana.str08.net

    grafana.ini:
      feature_toggles:
        provisioning: true
        kubernetesDashboards: true
