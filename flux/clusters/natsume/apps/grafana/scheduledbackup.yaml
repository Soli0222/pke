apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: grafana-cluster-daily-backup
  namespace: grafana
spec:
  schedule: "0 20 3 * * *"
  backupOwnerReference: self
  cluster:
    name: grafana-cluster
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
