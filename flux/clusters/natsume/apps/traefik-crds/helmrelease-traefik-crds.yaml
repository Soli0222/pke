apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik-crds
  namespace: traefik-crds
spec:
  interval: 10m
  releaseName: traefik-crds
  targetNamespace: traefik-crds
  install:
    createNamespace: false
    crds: Create
  upgrade:
    crds: CreateReplace
  chart:
    spec:
      chart: traefik-crds
      version: 1.16.0
      sourceRef:
        kind: HelmRepository
        name: traefik-crds-repo
        namespace: traefik-crds
      interval: 1h
