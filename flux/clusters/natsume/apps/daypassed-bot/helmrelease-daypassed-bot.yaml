apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: daypassed-bot
  namespace: daypassed-bot
spec:
  interval: 10m
  releaseName: daypassed-bot
  targetNamespace: daypassed-bot
  install:
    createNamespace: false
    crds: Create
  upgrade:
    crds: CreateReplace
  chart:
    spec:
      chart: daypassed-bot
      version: 0.1.0
      sourceRef:
        kind: HelmRepository
        name: daypassed-bot-repo
        namespace: daypassed-bot
      interval: 1h
  values:
    schedule: 0 15 * * *
    env:
      specificDate: '2023-04-07'
      misskeyHost: mi.soli0222.com
      tz: Asia/Tokyo
      customText: 今日は:polestar2023:が起動してから
    onepassword:
      enabled: true
      itemPath: vaults/Kubernetes/items/daypassed-bot
      itemResourceNameOverride: daypassed-bot-1password
      tokenFieldInItem: MK_TOKEN
