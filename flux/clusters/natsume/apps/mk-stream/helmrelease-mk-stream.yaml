apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mk-stream
  namespace: mk-stream
spec:
  interval: 10m
  releaseName: mk-stream
  targetNamespace: mk-stream
  install:
    createNamespace: false
    crds: Create
  upgrade:
    crds: CreateReplace
  chart:
    spec:
      chart: mk-stream
      version: 1.0.0
      sourceRef:
        kind: HelmRepository
        name: mk-stream-repo
        namespace: mk-stream
      interval: 1h
  values:
    onePassword:
      enabled: true
      itemPath: vaults/Kubernetes/items/mk-stream-secret
    env:
    - name: HOST
      value: mi.soli0222.com
