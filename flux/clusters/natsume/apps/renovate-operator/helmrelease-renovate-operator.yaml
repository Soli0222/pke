apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: renovate-operator
  namespace: renovate-operator
spec:
  interval: 10m
  releaseName: renovate-operator
  targetNamespace: renovate-operator
  install:
    createNamespace: false
    crds: Create
  upgrade:
    crds: CreateReplace
  chart:
    spec:
      chart: renovate-operator
      version: 4.7.1
      sourceRef:
        kind: HelmRepository
        name: renovate-operator-repo
        namespace: renovate-operator
      interval: 1h
  values:
    ingress:
      enabled: true
      ingressClassName: traefik
      host: renovate.str08.net
      tls:
      - hosts:
        - renovate.str08.net
        secretName: renovate.str08.net-http01
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-http01
        traefik.ingress.kubernetes.io/router.tls.options: cert-manager-pke-natsume-mtls@kubernetescrd
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
