apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: sui-cluster
  namespace: sui
spec:
  instances: 1
  plugins:
  - name: barman-cloud.cloudnative-pg.io
    isWALArchiver: true
    parameters:
      barmanObjectName: sui-backup-store
  storage:
    size: 5Gi
  bootstrap:
    initdb:
      database: sui
      owner: sui
