apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prometheus-operator-crds
  namespace: prometheus-operator-crd
spec:
  interval: 10m
  releaseName: prometheus-operator-crds
  targetNamespace: prometheus-operator-crd
  install:
    createNamespace: false
    crds: Create
  upgrade:
    crds: CreateReplace
  chart:
    spec:
      chart: prometheus-operator-crds
      version: 24.0.1
      sourceRef:
        kind: HelmRepository
        name: prometheus-operator-crds-repo
        namespace: prometheus-operator-crd
      interval: 1h
