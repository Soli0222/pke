apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: monitoring-mtls-client
  namespace: cert-manager
spec:
  commonName: monitoring-client
  secretName: monitoring-mtls-client-secret
  duration: 8760h # 1 year
  renewBefore: 720h # 30 days
  usages:
    - client auth
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: monitoring-mtls-ca-issuer
    kind: ClusterIssuer
