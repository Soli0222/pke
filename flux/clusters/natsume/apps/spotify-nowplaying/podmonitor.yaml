apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  annotations:
    cnpg.io/operatorVersion: 1.29.0
  labels:
    app.kubernetes.io/component: database
    app.kubernetes.io/instance: spn-cluster
    app.kubernetes.io/managed-by: cloudnative-pg
    app.kubernetes.io/name: postgresql
    app.kubernetes.io/version: "18"
    cnpg.io/cluster: spn-cluster
  name: spn-cluster
  namespace: spotify-nowplaying
spec:
  podMetricsEndpoints:
  - port: metrics
  selector:
    matchLabels:
      cnpg.io/cluster: spn-cluster
      cnpg.io/podRole: instance
