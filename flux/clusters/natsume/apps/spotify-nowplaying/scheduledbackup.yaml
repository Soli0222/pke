apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: spn-cluster-daily-backup
  namespace: spotify-nowplaying
spec:
  schedule: "0 20 3 * * *"
  backupOwnerReference: self
  cluster:
    name: spn-cluster
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
