apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: spn-cluster
  namespace: spotify-nowplaying
spec:
  instances: 1
  plugins:
  - name: barman-cloud.cloudnative-pg.io
    isWALArchiver: true
    parameters:
      barmanObjectName: spn-backup-store
  storage:
    size: 5Gi
  bootstrap:
    initdb:
      database: spn
      owner: spn
