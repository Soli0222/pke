apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: summaly
  namespace: summaly
spec:
  interval: 10m
  releaseName: summaly
  targetNamespace: summaly
  install:
    createNamespace: false
    crds: Create
  upgrade:
    crds: CreateReplace
  chart:
    spec:
      chart: summaly
      version: 0.1.7
      sourceRef:
        kind: HelmRepository
        name: summaly-repo
        namespace: summaly
      interval: 1h
  values:
    ingress:
      enabled: true
      className: traefik
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-http01
      hosts:
      - host: summaly.soli0222.com
        paths:
        - path: "/"
          pathType: Prefix
      tls:
      - hosts:
        - summaly.soli0222.com
        secretName: summaly.soli0222.com-http01
    env:
      - name: NODE_ENV
        value: "production"
      - name: SUMMALY_RESPONSE_TIMEOUT
        value: "15000"
      - name: SUMMALY_OPERATION_TIMEOUT
        value: "15000"
