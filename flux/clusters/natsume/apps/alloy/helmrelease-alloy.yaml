apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: alloy
  namespace: alloy
spec:
  interval: 10m
  releaseName: alloy
  targetNamespace: alloy
  install:
    createNamespace: false
    crds: Create
  upgrade:
    crds: CreateReplace
  chart:
    spec:
      chart: alloy
      version: 1.8.0
      sourceRef:
        kind: HelmRepository
        name: alloy-repo
        namespace: alloy
      interval: 1h
  values:
    alloy:
      configMap:
        create: false
        name: alloy-config
        key: config.alloy
      stabilityLevel: experimental
      enableReporting: false
    controller:
      type: deployment
    serviceMonitor:
      enabled: true
    ingress:
      enabled: true
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-dns01
        traefik.ingress.kubernetes.io/router.tls.options: cert-manager-pke-natsume-mtls@kubernetescrd
      faroPort: 12345
      ingressClassName: traefik
      hosts:
      - alloy.str08.net
      tls:
      - hosts:
        - alloy.str08.net
        secretName: alloy.str08.net-dns01
