apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mimir
  namespace: mimir
spec:
  interval: 10m
  releaseName: mimir
  targetNamespace: mimir
  install:
    createNamespace: false
  chart:
    spec:
      chart: mimir
      version: 0.1.1
      sourceRef:
        kind: HelmRepository
        name: mimir-repo
        namespace: mimir
      interval: 1h
  values:
    envFrom:
      - secretRef:
          name: r2-o11y-secret

    mimir:
      config: |
        target: all,alertmanager,ruler
        multitenancy_enabled: false

        common:
          storage:
            backend: s3
            s3:
              endpoint: ${S3_ENDPOINT}
              region: auto
              access_key_id: ${S3_ACCESS_KEY_ID}
              secret_access_key: ${S3_SECRET_ACCESS_KEY}

        blocks_storage:
          s3:
            bucket_name: mimir-blocks
          tsdb:
            dir: /data/tsdb
            head_compaction_interval: 15m
            wal_replay_concurrency: 3

        alertmanager:
          data_dir: /data/alertmanager
          persist_interval: 1h
          poll_interval: 5m
          sharding_ring:
            kvstore:
              store: memberlist

        alertmanager_storage:
          s3:
            bucket_name: mimir-alertmanager

        ruler_storage:
          s3:
            bucket_name: mimir-ruler

        compactor:
          data_dir: /data/compactor
          sharding_ring:
            kvstore:
              store: memberlist

        distributor:
          ring:
            kvstore:
              store: memberlist

        ingester:
          ring:
            replication_factor: {{ .Values.replicaCount }}
            kvstore:
              store: memberlist

        store_gateway:
          sharding_ring:
            replication_factor: {{ .Values.replicaCount }}
            kvstore:
              store: memberlist

        limits:
          compactor_blocks_retention_period: 60d
          max_global_series_per_user: 1000000
          ingestion_rate: 50000
          ingestion_burst_size: 1000000
          out_of_order_time_window: 5m
          max_fetched_series_per_query: 50000
          max_fetched_chunks_per_query: 2000000
          max_query_parallelism: 14

        memberlist:
          bind_port: {{ .Values.memberlistService.port }}
          abort_if_cluster_join_fails: false
          join_members:
            - dnssrv+{{ include "mimir.memberlistServiceName" . }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.memberlistService.port }}

        server:
          http_listen_port: {{ .Values.service.httpPort }}
          grpc_listen_port: {{ .Values.service.grpcPort }}
          log_level: info

    ingresses:
      - name: mimir
        className: traefik
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-http01
          traefik.ingress.kubernetes.io/router.tls.options: cert-manager-pke-natsume-mtls@kubernetescrd
        hosts:
          - host: mimir.pstr.space
            paths:
              - path: /
                pathType: Prefix
        tls:
          - hosts:
              - mimir.pstr.space
            secretName: mimir.pstr.space-http01

    resources:
      requests:
        cpu: 200m
        memory: 1Gi
      limits:
        memory: 4Gi

    serviceMonitor:
      enabled: true
