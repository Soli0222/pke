apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mc-mirror-cronjob
  namespace: mc-mirror-cronjob
spec:
  interval: 10m
  releaseName: mc-mirror-cronjob
  targetNamespace: mc-mirror-cronjob
  install:
    createNamespace: false
    crds: Create
  upgrade:
    crds: CreateReplace
  chart:
    spec:
      chart: mc-mirror-cronjob
      version: 1.0.0
      sourceRef:
        kind: HelmRepository
        name: mc-mirror-cronjob-repo
        namespace: mc-mirror-cronjob
      interval: 1h
  values:
    externalSecret:
      name: mc-mirror-cronjob-secrets
