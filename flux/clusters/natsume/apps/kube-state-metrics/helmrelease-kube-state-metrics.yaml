apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-state-metrics
  namespace: kube-state-metrics
spec:
  interval: 10m
  releaseName: kube-state-metrics
  targetNamespace: kube-state-metrics
  install:
    createNamespace: false
    crds: Create
  upgrade:
    crds: CreateReplace
  chart:
    spec:
      chart: kube-state-metrics
      version: 7.3.0
      sourceRef:
        kind: HelmRepository
        name: kube-state-metrics-repo
        namespace: kube-state-metrics
      interval: 1h
  values:
    prometheus:
      monitor:
        enabled: true
        honorLabels: true
