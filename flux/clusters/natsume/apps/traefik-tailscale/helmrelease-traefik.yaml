apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik-tailscale
  namespace: traefik-tailscale
spec:
  interval: 10m
  releaseName: traefik-tailscale
  targetNamespace: traefik-tailscale
  install:
    createNamespace: false
    crds: Skip
  upgrade:
    crds: Skip
  chart:
    spec:
      chart: traefik
      version: 39.0.8
      sourceRef:
        kind: HelmRepository
        name: traefik-repo
        namespace: traefik-tailscale
      interval: 1h
  values:
    deployment:
      kind: DaemonSet
    logs:
      access:
        enabled: true
    metrics:
      addInternals: true
      prometheus:
        serviceMonitor:
          enabled: true
    service:
      spec:
        externalTrafficPolicy: Local
        loadBalancerClass: "tailscale"
    ingressClass:
      enabled: true
      isDefaultClass: false
      name: traefik-tailscale
    providers:
      kubernetesCRD:
        ingressClass: traefik-tailscale
      kubernetesIngress:
        ingressClass: traefik-tailscale
