apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: misskey-stg
  namespace: misskey-stg
spec:
  interval: 10m
  releaseName: misskey-stg
  targetNamespace: misskey-stg
  dependsOn:
  - name: misskey-stg-valkey
  install:
    createNamespace: false
    crds: Create
  upgrade:
    crds: CreateReplace
  chart:
    spec:
      chart: misskey
      version: 0.1.4
      sourceRef:
        kind: HelmRepository
        name: misskey-repo
        namespace: misskey-stg
      interval: 1h
  values:
    misskey:
      url: "https://misskey-stg.pstr.space"
      id: "aid"
      clusterLimit: 1

      outgoingAddressFamily: "dual"

      fulltextSearch:
        provider: sqlPgroonga

    web:
      replicaCount: 2

      image:
        repository: ghcr.io/soli0222/misskey
        tag: "2026.5.0-psr.9.10"

      persistence:
        enabled: false

    postgresql:
      enabled: false

    externalPostgresql:
      host: "misskey-stg-cluster-rw"
      port: 5432
      database: misskey_stg
      username: misskey_stg
      existingSecret: "misskey-stg-cluster-app"
      existingSecretKey: "password"

    redis:
      enabled: false

    externalRedis:
      host: "misskey-stg-valkey"
      port: 6379

    ingress:
      enabled: true
      className: "traefik"
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-http01
        external-dns.alpha.kubernetes.io/cloudflare-proxied: 'true'
      hosts:
      - host: misskey-stg.pstr.space
        paths:
        - path: /
          pathType: Prefix
      tls:
      - secretName: misskey-stg.pstr.space-http01
        hosts:
        - misskey-stg.pstr.space
