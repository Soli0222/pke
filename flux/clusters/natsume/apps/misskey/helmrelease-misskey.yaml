apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: misskey
  namespace: misskey
spec:
  interval: 10m
  releaseName: misskey
  targetNamespace: misskey
  dependsOn:
  - name: misskey-valkey
  install:
    createNamespace: false
    crds: Create
  upgrade:
    crds: CreateReplace
  chart:
    spec:
      chart: misskey
      version: 0.1.5
      sourceRef:
        kind: HelmRepository
        name: misskey-repo
        namespace: misskey
      interval: 1h
  values:
    misskey:
      url: "https://mi.soli0222.com"
      id: "aid"
      clusterLimit: 2

      outgoingAddressFamily: "dual"

      deliverJobConcurrency: "128"
      inboxJobConcurrency: "64"
      deliverJobPerSec: "128"
      inboxJobPerSec: "128"
      deliverJobMaxAttempts: "12"
      inboxJobMaxAttempts: "8"

      fulltextSearch:
        provider: sqlPgroonga

    web:
      replicaCount: 2

      image:
        repository: ghcr.io/soli0222/misskey
        tag: "2026.5.1-psr.9.10"

      persistence:
        enabled: false

    postgresql:
      enabled: false

    externalPostgresql:
      host: "misskey-pooler-rw"
      port: 5432
      database: misskey
      username: misskey
      existingSecret: "misskey-cluster-app"
      existingSecretKey: "password"

    redis:
      enabled: false

    externalRedis:
      host: "misskey-valkey"
      port: 6379

    ingress:
      enabled: true
      className: "traefik"
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-http01
        external-dns.alpha.kubernetes.io/cloudflare-proxied: 'true'
      hosts:
      - host: mi.soli0222.com
        paths:
        - path: /
          pathType: Prefix
      tls:
      - secretName: mi.soli0222.com-http01
        hosts:
        - mi.soli0222.com
