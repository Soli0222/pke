apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: misskey
  namespace: misskey
spec:
  interval: 10m
  releaseName: misskey
  targetNamespace: misskey
  dependsOn:
  - name: misskey-valkey
  install:
    createNamespace: false
    crds: Create
  upgrade:
    crds: CreateReplace
  chart:
    spec:
      chart: misskey
      version: 0.4.0
      sourceRef:
        kind: HelmRepository
        name: misskey-repo
        namespace: misskey
      interval: 1h
  values:
    misskey:
      url: "https://mi.soli0222.com"
      id: "aid"
      clusterLimit: 3

      outgoingAddressFamily: "dual"

      deliverJobConcurrency: "128"
      inboxJobConcurrency: "64"
      deliverJobPerSec: "128"
      inboxJobPerSec: "128"
      deliverJobMaxAttempts: "12"
      inboxJobMaxAttempts: "4"

      fulltextSearch:
        provider: sqlPgroonga
      
      logging:
        level: info
        format: json

      otelForBackend:
        enabled: true
        # -- OTLP traces endpoint (e.g. http://localhost:4318/v1/traces)
        endpoint: "http://alloy-otlp.alloy.svc.cluster.local:4318/v1/traces"
        capturePgSpans: true
        capturePgStatement: true
        capturePgConnectionSpans: true
        captureRedisCommandSpans: true
        captureRedisConnectionSpans: true
        captureRedisRootSpans: true

    web:
      replicaCount: 1

      extraEnv:
      - name: TZ
        value: Asia/Tokyo

      diagnosticReport:
        enabled: false

      image:
        repository: ghcr.io/soli0222/misskey
        tag: "2026.7.0-beta.1-psr.9.11"

      persistence:
        enabled: false

    migration:
      enabled: true
      hookEvents:
      - pre-upgrade

    postgresql:
      enabled: false

    externalPostgresql:
      host: "misskey-cluster-rw"
      port: 5432
      database: misskey
      username: misskey
      existingSecret: "misskey-cluster-app"
      existingSecretKey: "password"

    redis:
      enabled: false

    externalRedis:
      host: "misskey-valkey"
      port: 6379

    ingress:
      enabled: true
      className: "traefik"
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-http01
        external-dns.alpha.kubernetes.io/cloudflare-proxied: 'true'
      hosts:
      - host: mi.soli0222.com
        paths:
        - path: /
          pathType: Prefix
      tls:
      - secretName: mi.soli0222.com-http01
        hosts:
        - mi.soli0222.com
