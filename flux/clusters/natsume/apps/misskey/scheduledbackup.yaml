apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: misskey-cluster-daily-backup
  namespace: misskey
spec:
  schedule: "0 30 3 * * *"
  backupOwnerReference: self
  cluster:
    name: misskey-cluster
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
