apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tailscale-operator
  namespace: tailscale
spec:
  interval: 10m
  releaseName: tailscale-operator
  targetNamespace: tailscale
  install:
    createNamespace: false
    crds: Create
  upgrade:
    crds: CreateReplace
  chart:
    spec:
      chart: tailscale-operator
      version: 1.96.5
      sourceRef:
        kind: HelmRepository
        name: tailscale-operator-repo
        namespace: tailscale
      interval: 1h
