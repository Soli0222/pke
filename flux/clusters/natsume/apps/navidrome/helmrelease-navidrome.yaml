apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: navidrome
  namespace: navidrome
spec:
  interval: 10m
  releaseName: navidrome
  targetNamespace: navidrome
  install:
    createNamespace: false
    crds: Create
  upgrade:
    crds: CreateReplace
  chart:
    spec:
      chart: navidrome
      version: 2.3.0
      sourceRef:
        kind: HelmRepository
        name: navidrome-repo
        namespace: navidrome
      interval: 1h
  values:
    replicaCount: 1
    persistence:
      music:
        size: 100Gi
    ingress:
      enabled: true
      className: traefik
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-http01
        external-dns.alpha.kubernetes.io/cloudflare-proxied: 'true'
      hosts:
      - host: navidrome.pstr.space
        paths:
        - path: "/"
          pathType: ImplementationSpecific
      tls:
      - hosts:
        - navidrome.pstr.space
        secretName: navidrome.pstr.space-http01
    serviceMonitor:
      enabled: true
    config:
      enableInsightsCollector: false
      scanner:
        schedule: "*/5 * * * *"
        purgeMissing: always
      deezer:
        language: ja
