apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: natsume-03-node-records
  namespace: external-dns
spec:
  endpoints:
  - dnsName: natsume-03.str08.net
    recordType: A
    targets:
    - 192.168.9.3
  - dnsName: natsume-03.str08.net
    recordType: AAAA
    targets:
    - fd00:192:168:9::3
  - dnsName: natsume-03.pstr.space
    recordType: A
    targets:
    - 133.18.141.63
  - dnsName: natsume-03.pstr.space
    recordType: AAAA
    targets:
    - 2406:8c00:0:3464:133:18:141:63
  - dnsName: natsume-03.tailscale.str08.net
    recordType: A
    targets:
    - 100.122.94.87
  - dnsName: natsume-03.tailscale.str08.net
    recordType: AAAA
    targets:
    - fd7a:115c:a1e0::c639:5e57
