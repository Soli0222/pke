apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: note-tweet-connector
  namespace: note-tweet-connector
spec:
  interval: 10m
  releaseName: note-tweet-connector
  targetNamespace: note-tweet-connector
  install:
    createNamespace: false
    crds: Create
  upgrade:
    crds: CreateReplace
  chart:
    spec:
      chart: note-tweet-connector
      version: 2.0.0-beta.1
      sourceRef:
        kind: HelmRepository
        name: note-tweet-connector-repo
        namespace: note-tweet-connector
      interval: 1h
  values:
    args:
      twitterUsername: "Soli_0222"
    ingress:
      enabled: true
      className: traefik
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-http01
      hosts:
      - host: ntc.pstr.space
        paths:
        - path: "/"
          pathType: ImplementationSpecific
      tls:
      - hosts:
        - ntc.pstr.space
        secretName: ntc.pstr.space-http01
    monitoring:
      serviceMonitor:
        enabled: true
      prometheusRule:
        enabled: true
