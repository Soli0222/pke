apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: grafana
  namespace: flux-system
spec:
  interval: 10m
  path: "./flux/clusters/natsume/apps/grafana"
  prune: true
  wait: true
  timeout: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  postBuild:
    substituteFrom:
    - kind: Secret
      name: cnpg-backup-flux-vars
  dependsOn:
  - name: cert-manager-config
  - name: cnpg
  - name: cnpg-backup-config
  - name: prometheus-operator-crd
  - name: traefik
