apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cnpg-backup-config
  namespace: flux-system
spec:
  interval: 10m
  path: "./flux/clusters/natsume/apps/cnpg-backup-config"
  prune: true
  wait: true
  timeout: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  healthChecks:
  - apiVersion: v1
    kind: Secret
    name: cnpg-backup-flux-vars
    namespace: flux-system
