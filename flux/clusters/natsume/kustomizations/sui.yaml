apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: sui
  namespace: flux-system
spec:
  interval: 10m
  path: "./flux/clusters/natsume/apps/sui"
  prune: true
  wait: true
  timeout: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
  - name: daypassed-bot
  - name: external-dns
  - name: external-secrets
  - name: kube-state-metrics
  - name: mk-stream
  - name: tailscale-operator
  - name: traefik
