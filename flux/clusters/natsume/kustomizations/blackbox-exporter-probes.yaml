apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: blackbox-exporter-probes
  namespace: flux-system
spec:
  interval: 10m
  path: "./flux/clusters/natsume/apps/blackbox-exporter-probes"
  prune: true
  wait: true
  timeout: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
  - name: prometheus-blackbox-exporter
