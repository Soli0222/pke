apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: prometheus-blackbox-exporter
  namespace: flux-system
spec:
  interval: 10m
  path: "./flux/clusters/natsume/apps/prometheus-blackbox-exporter"
  prune: true
  wait: true
  timeout: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
  - name: emoji-service
  - name: navidrome
  - name: note-tweet-connector
  - name: registry
  - name: renovate-operator
  - name: rss-fetcher
  - name: spotify-nowplaying
  - name: spotify-reblend
  - name: sui
  - name: summaly
  - name: uptime-kuma
