apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: misskey
  namespace: flux-system
spec:
  interval: 10m
  path: "./flux/clusters/meruto/apps/misskey"
  prune: true
  wait: true
  timeout: 4h
  sourceRef:
    kind: GitRepository
    name: flux-system
  postBuild:
    substituteFrom:
    - kind: Secret
      name: cnpg-backup-flux-vars
  dependsOn:
  - name: cnpg
  - name: cnpg-backup-config
  - name: topolvm
