apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ix2215-snmp-exporter
  namespace: ix2215-snmp-exporter
spec:
  interval: 10m
  releaseName: ix2215-snmp-exporter
  targetNamespace: ix2215-snmp-exporter
  install:
    createNamespace: false
    crds: Create
  upgrade:
    crds: CreateReplace
  chart:
    spec:
      chart: prometheus-snmp-exporter
      version: 9.13.1
      sourceRef:
        kind: HelmRepository
        name: prometheus-community-repo
        namespace: ix2215-snmp-exporter
      interval: 1h
  values:
    extraArgs:
    - "--config.file=/run/secrets/snmp-exporter/snmp.yml"
    extraSecretMounts:
    - name: snmp-config
      mountPath: /run/secrets/snmp-exporter
      secretName: snmp-exporter-config
      readOnly: true
      defaultMode: 420
    serviceMonitor:
      enabled: true
      path: /snmp
      scrapeTimeout: 30s
      module:
      - ix2215_full
      auth:
      - ix2215_v3
      honorLabels: true
      params:
      - name: ix2215
        target: 192.168.10.1
        module:
        - ix2215_full
        auth:
        - ix2215_v3
        interval: 60s
        scrapeTimeout: 30s
