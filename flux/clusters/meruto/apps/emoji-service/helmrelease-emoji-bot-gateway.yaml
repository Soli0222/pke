apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: emoji-bot-gateway
  namespace: emoji-service
spec:
  interval: 10m
  releaseName: emoji-bot-gateway
  targetNamespace: emoji-service
  install:
    createNamespace: false
    crds: Create
  upgrade:
    crds: CreateReplace
  chart:
    spec:
      chart: emoji-bot-gateway
      version: 0.1.5
      sourceRef:
        kind: HelmRepository
        name: emoji-bot-gateway-repo-2
        namespace: emoji-service
      interval: 1h
  values:
    config:
      misskeyHost: mi.soli0222.com
      rendererBaseUrl: http://emoji-renderer:8109
      existingSecret: emoji-bot-gateway-secret
    valkey:
      enabled: false
    externalValkey:
      host: emoji-bot-gateway-valkey
    metrics:
      serviceMonitor:
        enabled: true
