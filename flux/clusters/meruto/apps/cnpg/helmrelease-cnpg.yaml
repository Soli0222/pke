apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cnpg
  namespace: cnpg-system
spec:
  interval: 10m
  releaseName: cnpg
  targetNamespace: cnpg-system
  install:
    createNamespace: false
    crds: Create
  upgrade:
    crds: CreateReplace
  chart:
    spec:
      chart: cloudnative-pg
      version: 0.28.0
      sourceRef:
        kind: HelmRepository
        name: cloudnative-pg-repo
        namespace: cnpg-system
      interval: 1h
  values:
    monitoring:
      podMonitorEnabled: true
