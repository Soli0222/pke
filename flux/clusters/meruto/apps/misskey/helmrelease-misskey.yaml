apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: misskey
  namespace: misskey
spec:
  interval: 10m
  timeout: 4h
  releaseName: misskey
  targetNamespace: misskey
  dependsOn:
  - name: misskey-valkey
  install:
    createNamespace: false
    crds: Create
  upgrade:
    crds: CreateReplace
  chart:
    spec:
      chart: misskey
      version: 0.3.1
      sourceRef:
        kind: HelmRepository
        name: misskey-repo
        namespace: misskey
      interval: 1h
  values:
    misskey:
      url: "https://mi.soli0222.com"
      id: "aid"
      clusterLimit: 1

      outgoingAddressFamily: "dual"

      deliverJobConcurrency: "8"
      inboxJobConcurrency: "8"
      deliverJobPerSec: "8"
      inboxJobPerSec: "8"
      deliverJobMaxAttempts: "1"
      inboxJobMaxAttempts: "1"

      fulltextSearch:
        provider: sqlPgroonga

    web:
      replicaCount: 1

      extraEnv:
      - name: TZ
        value: Asia/Tokyo

      diagnosticReport:
        enabled: false

      image:
        repository: ghcr.io/soli0222/misskey
        tag: "2026.6.0-psr.9.10"

      persistence:
        enabled: false

    migration:
      enabled: true
      hookEvents:
      - pre-upgrade
      activeDeadlineSeconds: 14400

    postgresql:
      enabled: false

    externalPostgresql:
      host: "misskey-cluster-rw"
      port: 5432
      database: misskey
      username: misskey
      existingSecret: "misskey-cluster-app"
      existingSecretKey: "password"

    redis:
      enabled: false

    externalRedis:
      host: "misskey-valkey"
      port: 6379

    ingress:
      enabled: false
