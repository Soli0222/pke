apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: misskey-cluster
  namespace: misskey
spec:
  instances: 1
  imageName: ghcr.io/soli0222/pgroonga-cnpg/4.0.6-alpine:18
  primaryUpdateMethod: switchover
  smartShutdownTimeout: 60
  affinity:
    nodeSelector:
      kubernetes.io/hostname: meruto-01
  resources:
    requests:
      cpu: 500m
      memory: 4Gi
    limits:
      cpu: "3"
      memory: 6Gi
  postgresql:
    parameters:
      max_connections: "100"
      shared_buffers: 1536MB
      effective_cache_size: 4GB
      maintenance_work_mem: 256MB
      work_mem: 8MB
      random_page_cost: "1.1"
      effective_io_concurrency: "200"
      min_wal_size: 1GB
      max_wal_size: 4GB
      wal_compression: "on"
      track_io_timing: "on"
      track_wal_io_timing: "on"
      max_worker_processes: "6"
      max_parallel_workers: "4"
      max_parallel_workers_per_gather: "2"
      max_parallel_maintenance_workers: "2"
      autovacuum_max_workers: "4"
      autovacuum_work_mem: 256MB
      autovacuum_vacuum_threshold: "1000"
      autovacuum_vacuum_scale_factor: "0.02"
      autovacuum_analyze_threshold: "1000"
      autovacuum_analyze_scale_factor: "0.01"
      timezone: Asia/Tokyo
      log_timezone: Asia/Tokyo
  storage:
    storageClass: topolvm
    size: 90Gi
    resizeInUseVolumes: false
  bootstrap:
    recovery:
      source: misskey-cluster-source
  externalClusters:
  - name: misskey-cluster-source
    plugin:
      name: barman-cloud.cloudnative-pg.io
      parameters:
        barmanObjectName: misskey-backup-store
        serverName: misskey-cluster
