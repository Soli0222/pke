apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: note-tweet-connector
  namespace: note-tweet-connector
spec:
  interval: 10m
  releaseName: note-tweet-connector
  targetNamespace: note-tweet-connector
  install:
    createNamespace: false
    crds: Create
  upgrade:
    crds: CreateReplace
  chart:
    spec:
      chart: note-tweet-connector
      version: 1.0.3
      sourceRef:
        kind: HelmRepository
        name: note-tweet-connector-repo
        namespace: note-tweet-connector
      interval: 1h
  values:
    ingress:
      enabled: true
      className: cloudflare-tunnel
      hosts:
      - host: ntc.pstr.space
        paths:
        - path: "/"
          pathType: ImplementationSpecific
    monitoring:
      serviceMonitor:
        enabled: true
      prometheusRule:
        enabled: true
