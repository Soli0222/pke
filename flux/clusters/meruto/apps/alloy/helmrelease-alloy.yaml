apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: alloy
  namespace: alloy
spec:
  interval: 10m
  releaseName: alloy
  targetNamespace: alloy
  install:
    createNamespace: false
    crds: Create
  upgrade:
    crds: CreateReplace
  chart:
    spec:
      chart: alloy
      version: 1.10.0
      sourceRef:
        kind: HelmRepository
        name: alloy-repo
        namespace: alloy
      interval: 1h
  values:
    alloy:
      configMap:
        create: false
        name: alloy-config
        key: config.alloy
      extraPorts:
      - name: otlp-grpc
        port: 4317
        targetPort: 4317
        protocol: TCP
        appProtocol: grpc
      - name: otlp-http
        port: 4318
        targetPort: 4318
        protocol: TCP
      stabilityLevel: experimental
      enableReporting: false
    controller:
      type: deployment
    serviceMonitor:
      enabled: true
