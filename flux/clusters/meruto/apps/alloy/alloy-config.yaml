apiVersion: v1
kind: ConfigMap
metadata:
  name: alloy-config
  namespace: alloy
data:
  config.alloy: |
    // ============================================================
    // mTLS client cert (loaded from k8s Secret at runtime)
    // ============================================================

    remote.kubernetes.secret "mtls" {
      namespace = "alloy"
      name      = "pke-natsume-mtls"
    }

    remote.kubernetes.secret "slack_webhook" {
      namespace = "alloy"
      name      = "alertmanager-slack-webhook"
    }

    // ============================================================
    // Endpoints (external mTLS-protected, shared with natsume)
    // ============================================================

    loki.write "default" {
      endpoint {
        url = "https://loki.pstr.space/loki/api/v1/push"
        tls_config {
          cert_pem = remote.kubernetes.secret.mtls.data["tls.crt"]
          key_pem  = remote.kubernetes.secret.mtls.data["tls.key"]
        }
        headers = {
          "X-Scope-OrgID" = "fake",
        }
      }
    }

    prometheus.remote_write "default" {
      endpoint {
        url = "https://mimir.pstr.space/api/v1/push"
        tls_config {
          cert_pem = remote.kubernetes.secret.mtls.data["tls.crt"]
          key_pem  = remote.kubernetes.secret.mtls.data["tls.key"]
        }
        headers = {
          "X-Scope-OrgID" = "anonymous",
        }
      }

      external_labels = {
        cluster = "meruto",
      }
    }

    // ============================================================
    // Mimir Rules & Alerts
    // ============================================================

    mimir.rules.kubernetes "default" {
      address = "https://mimir.pstr.space"
      tenant_id = "anonymous"
      tls_config {
        cert_pem = remote.kubernetes.secret.mtls.data["tls.crt"]
        key_pem  = remote.kubernetes.secret.mtls.data["tls.key"]
      }
      rule_selector { match_labels = {} }
      rule_namespace_selector { match_labels = {} }
    }

    mimir.alerts.kubernetes "default" {
      address = "https://mimir.pstr.space"
      tls_config {
        cert_pem = remote.kubernetes.secret.mtls.data["tls.crt"]
        key_pem  = remote.kubernetes.secret.mtls.data["tls.key"]
      }
      http_headers = {
        "X-Scope-OrgID" = ["anonymous"],
      }
      global_config = `
        global:
          resolve_timeout: 5m
          slack_api_url: ` + remote.kubernetes.secret.slack_webhook.data["api-url"] + `
        route:
          receiver: slack_webhook
          group_by: ['alertname']
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 12h
        receivers:
          - name: slack_webhook
            slack_configs:
              - channel: '#alert'
                title: 'Alert: {{ .GroupLabels.alertname }}'
                text: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'
                send_resolved: true
                username: 'Alertmanager'
                icon_emoji: ':warning:'
        `
      alertmanagerconfig_selector { match_labels = {} }
      alertmanagerconfig_namespace_selector { match_labels = {} }
    }

    // ============================================================
    // Discovery
    // ============================================================

    discovery.kubernetes "nodes" {
      role = "node"
    }

    discovery.kubernetes "pods" {
      role = "pod"
    }

    discovery.kubernetes "api_endpoints" {
      role = "endpoints"
    }

    // ============================================================
    // Metrics: Kubernetes API Server
    // ============================================================

    discovery.relabel "kubernetes_api" {
      targets = discovery.kubernetes.api_endpoints.targets

      rule {
        action        = "keep"
        source_labels = ["__meta_kubernetes_service_name", "__meta_kubernetes_namespace"]
        separator     = ";"
        regex         = "kubernetes;default"
      }
      rule {
        action        = "keep"
        source_labels = ["__meta_kubernetes_endpoint_port_name"]
        regex         = "https"
      }
    }

    prometheus.scrape "kubernetes_api" {
      targets         = discovery.relabel.kubernetes_api.output
      forward_to      = [prometheus.remote_write.default.receiver]
      scrape_interval = "30s"
      metrics_path    = "/metrics"
      clustering { enabled = true }
    }

    // ============================================================
    // Metrics: Kubelet & cAdvisor
    // ============================================================

    discovery.relabel "kubelet_targets" {
      targets = discovery.kubernetes.nodes.targets

      rule {
        action        = "replace"
        source_labels = ["__meta_kubernetes_node_address_InternalIP"]
        target_label  = "__address__"
        regex         = "(.+)"
        replacement   = "$1:10250"
      }
      rule {
        action        = "replace"
        source_labels = ["__meta_kubernetes_node_name"]
        target_label  = "node"
      }
      rule {
        action        = "replace"
        source_labels = ["__meta_kubernetes_node_name"]
        target_label  = "instance"
      }
    }

    prometheus.scrape "kubernetes_nodes" {
      targets         = discovery.relabel.kubelet_targets.output
      forward_to      = [prometheus.remote_write.default.receiver]
      scrape_interval = "30s"
      metrics_path    = "/metrics"
      scheme          = "https"
      bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
      tls_config {
        ca_file              = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
        insecure_skip_verify = true
      }
      clustering { enabled = true }
    }

    prometheus.scrape "kubernetes_cadvisor" {
      targets         = discovery.relabel.kubelet_targets.output
      forward_to      = [prometheus.remote_write.default.receiver]
      scrape_interval = "30s"
      metrics_path    = "/metrics/cadvisor"
      scheme          = "https"
      bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
      tls_config {
        ca_file              = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
        insecure_skip_verify = true
      }
      clustering { enabled = true }
    }

    // ============================================================
    // Metrics: Operator CRDs (ServiceMonitor / PodMonitor / Probe)
    // ============================================================

    prometheus.operator.servicemonitors "default" {
      forward_to = [prometheus.remote_write.default.receiver]
      clustering { enabled = true }
    }

    prometheus.operator.podmonitors "default" {
      forward_to = [prometheus.remote_write.default.receiver]
      clustering { enabled = true }
    }

    prometheus.operator.probes "default" {
      forward_to = [prometheus.remote_write.default.receiver]
      clustering { enabled = true }
    }

    // ============================================================
    // Metrics: Alloy self-monitoring
    // ============================================================

    prometheus.scrape "alloy_metrics" {
      targets         = [{"__address__" = "localhost:12345"}]
      forward_to      = [prometheus.remote_write.default.receiver]
      scrape_interval = "15s"
      metrics_path    = "/metrics"
      clustering { enabled = true }
    }

    // ============================================================
    // Logs: Pod logs with node label
    // ============================================================

    discovery.relabel "pod_logs" {
      targets = discovery.kubernetes.pods.targets

      rule {
        source_labels = ["__meta_kubernetes_namespace"]
        target_label  = "namespace"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_name"]
        target_label  = "pod"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_container_name"]
        target_label  = "container"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
        target_label  = "app"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_node_name"]
        target_label  = "node"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_container_id"]
        target_label  = "container_runtime"
        regex         = "^(\\S+):\\/\\/.+$"
        replacement   = "$1"
      }
      rule {
        source_labels = ["__meta_kubernetes_namespace", "__meta_kubernetes_pod_name"]
        separator     = "/"
        target_label  = "job"
      }
      rule {
        source_labels = ["__meta_kubernetes_namespace", "__meta_kubernetes_pod_name", "__meta_kubernetes_pod_uid", "__meta_kubernetes_pod_container_name"]
        separator     = ";"
        regex         = "([^;]+);([^;]+);([^;]+);([^;]+)"
        replacement   = "/var/log/pods/$1_$2_$3/$4/*.log"
        target_label  = "__path__"
      }
    }

    loki.source.kubernetes "pod_logs" {
      targets    = discovery.relabel.pod_logs.output
      forward_to = [loki.process.pod_logs.receiver]
      clustering { enabled = true }
    }

    loki.process "pod_logs" {
      stage.static_labels {
        values = {
          cluster = "meruto",
        }
      }
      forward_to = [loki.write.default.receiver]
    }
