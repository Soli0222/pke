apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rss-fetcher-valkey
  namespace: rss-fetcher
spec:
  interval: 10m
  releaseName: rss-fetcher-valkey
  targetNamespace: rss-fetcher
  install:
    createNamespace: false
    crds: Create
  upgrade:
    crds: CreateReplace
  chart:
    spec:
      chart: valkey
      version: 0.9.4
      sourceRef:
        kind: HelmRepository
        name: valkey-repo-2
        namespace: rss-fetcher
      interval: 1h
  values:
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi
    initResources:
      limits:
        cpu: 100m
        memory: 128Mi
      requests:
        cpu: 100m
        memory: 128Mi
    replica:
      enabled: false
    dataStorage:
      enabled: true
      requestedSize: 1Gi
      className: ''
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
