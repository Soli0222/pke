apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: navidrome
  namespace: navidrome
spec:
  interval: 10m
  releaseName: navidrome
  targetNamespace: navidrome
  install:
    createNamespace: false
    crds: Create
  upgrade:
    crds: CreateReplace
  chart:
    spec:
      chart: navidrome
      version: 2.3.2
      sourceRef:
        kind: HelmRepository
        name: navidrome-repo
        namespace: navidrome
      interval: 1h
  values:
    replicaCount: 1
    persistence:
      music:
        existingVolume: navidrome-music
        storageClass: "-"
        size: 100Gi
        accessModes:
        - ReadOnlyMany
    ingress:
      enabled: true
      className: cloudflare-tunnel
      blockedPaths:
      - path: /metrics
        pathType: Prefix
      hosts:
      - host: navidrome.pstr.space
        paths:
        - path: "/"
          pathType: ImplementationSpecific
    serviceMonitor:
      enabled: true
    config:
      enableInsightsCollector: false
      scanner:
        schedule: "*/5 * * * *"
        purgeMissing: always
      deezer:
        language: ja
